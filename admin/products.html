<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{var q=new URLSearchParams(location.search).get('lang');var l=(q==='ar'||q==='en')?q:(localStorage.getItem('luvit_lang')||'en');if(q&&q===l)localStorage.setItem('luvit_lang',l);document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';}catch(e){}})();</script>
  <title>Products — LUVIT Admin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body data-page="products">

  <div class="admin-mobilebar">
    <a class="brand" href="dashboard.html">
      <img src="../assets/img/logo.svg" alt="">
      <span class="brand__name" data-i18n="brand.name">LUVIT</span>
    </a>
    <button type="button" id="sideToggle" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    </button>
  </div>
  <div class="admin-scrim" id="sideScrim"></div>

  <div class="admin">
    <aside class="admin-side" id="adminSide">
      <a class="brand" href="dashboard.html">
        <img src="../assets/img/logo.svg" alt="">
        <span><span class="brand__name" data-i18n="brand.name">LUVIT</span><span class="brand__role">Admin</span></span>
      </a>
      <nav class="admin-nav">
        <a href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg><span data-i18n="adm.nav.dashboard"></span></a>
        <a href="products.html" class="is-active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg><span data-i18n="adm.nav.products"></span></a>
        <a href="orders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M8 11h8"/><path d="M8 16h8"/></svg><span data-i18n="adm.nav.orders"></span></a>
        <span class="nav-sep"></span>
        <a href="../index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg><span data-i18n="adm.nav.store"></span></a>
        <a href="#" id="logoutBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span data-i18n="adm.nav.logout"></span></a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <h1 data-i18n="adm.pr.t"></h1>
          <p class="sub" data-i18n="adm.pr.d"></p>
        </div>
        <div class="topbar-actions">
          <div class="admin-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="prodSearch" data-i18n-placeholder="adm.pr.search" data-i18n-aria="adm.pr.search">
          </div>
          <button class="lang-toggle" type="button">عربي</button>
          <button class="btn" id="addProductBtn" data-i18n="adm.pr.add"></button>
        </div>
      </div>

      <div class="admin-card">
        <div class="table-wrap">
          <table class="data">
            <thead>
              <tr>
                <th data-i18n="tbl.product"></th>
                <th data-i18n="tbl.category"></th>
                <th data-i18n="tbl.price"></th>
                <th data-i18n="tbl.stock"></th>
                <th data-i18n="tbl.actions"></th>
              </tr>
            </thead>
            <tbody id="prodBody"></tbody>
          </table>
        </div>
        <p class="admin-empty" id="prodEmpty" data-i18n="adm.pr.empty" hidden></p>
      </div>
    </main>
  </div>

  <!-- Add / edit product modal -->
  <div class="modal" id="prodModal" role="dialog" aria-modal="true" aria-labelledby="prodModalTitle">
    <div class="modal__box">
      <div class="modal__head">
        <h2 id="prodModalTitle" data-i18n="adm.pr.new"></h2>
        <button class="modal__close" type="button" id="prodModalClose" aria-label="Close">✕</button>
      </div>

      <p class="form-error" id="prodError" data-i18n="err.pr.form"></p>

      <form id="prodForm" novalidate>
        <div class="modal-grid">
          <div class="field">
            <label for="fNameEn" data-i18n="adm.pr.nameEn"></label>
            <input id="fNameEn" type="text">
          </div>
          <div class="field">
            <label for="fNameAr" data-i18n="adm.pr.nameAr"></label>
            <input id="fNameAr" type="text" dir="rtl">
          </div>
          <div class="field">
            <label for="fTagEn" data-i18n="adm.pr.tagEn"></label>
            <input id="fTagEn" type="text">
          </div>
          <div class="field">
            <label for="fTagAr" data-i18n="adm.pr.tagAr"></label>
            <input id="fTagAr" type="text" dir="rtl">
          </div>
          <div class="field field--full">
            <label for="fDescEn" data-i18n="adm.pr.descEn"></label>
            <textarea id="fDescEn"></textarea>
          </div>
          <div class="field field--full">
            <label for="fDescAr" data-i18n="adm.pr.descAr"></label>
            <textarea id="fDescAr" dir="rtl"></textarea>
          </div>
          <div class="field">
            <label for="fPrice" data-i18n="adm.pr.price"></label>
            <input id="fPrice" type="number" min="0" step="0.100" placeholder="9.500">
          </div>
          <div class="field">
            <label for="fStock" data-i18n="adm.pr.stock"></label>
            <input id="fStock" type="number" min="0" step="1" placeholder="20">
          </div>
          <div class="field">
            <label for="fCat" data-i18n="adm.pr.cat"></label>
            <select id="fCat"></select>
          </div>
          <div class="field">
            <label for="fShape" data-i18n="adm.pr.shape"></label>
            <select id="fShape"></select>
          </div>
          <div class="field field--full">
            <label for="fImg" data-i18n="adm.pr.img"></label>
            <input id="fImg" type="text" dir="ltr" placeholder="assets/img/products/…jpg or https://…">
          </div>
        </div>

        <div class="art-picker">
          <div>
            <div class="field">
              <label data-i18n="adm.pr.palette"></label>
              <div class="swatches" id="fSwatches"></div>
            </div>
            <label class="check-field">
              <input type="checkbox" id="fFeatured">
              <span data-i18n="adm.pr.featured"></span>
            </label>
          </div>
          <div>
            <div class="field">
              <label data-i18n="adm.pr.preview"></label>
              <div class="art-preview" id="fPreview"></div>
            </div>
          </div>
        </div>

        <div class="modal__actions">
          <button class="btn btn--ghost" type="button" id="prodCancel" data-i18n="adm.pr.cancel"></button>
          <button class="btn" type="submit" data-i18n="adm.pr.save"></button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/db.js"></script>
  <script src="../assets/js/art.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
