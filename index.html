<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{var q=new URLSearchParams(location.search).get('lang');var l=(q==='ar'||q==='en')?q:(localStorage.getItem('luvit_lang')||'en');if(q&&q===l)localStorage.setItem('luvit_lang',l);document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';}catch(e){}})();</script>
  <title>LUVIT — Abayas & Modest Wear from Oman</title>
  <meta name="description" content="LUVIT — abayas, kaftans and hijabs from Oman. Everyday and occasion pieces, hand-finished embroidery. Priced in Omani Rial. Free delivery across Oman.">
  <meta property="og:title" content="LUVIT — Abayas & Modest Wear from Oman">
  <meta property="og:description" content="Abayas, kaftans and hijabs designed in Oman — everyday and occasion pieces with hand-finished embroidery. Prices in Omani Rial.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/store.css">
</head>
<body>

  <p class="announce" data-i18n="announce"></p>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/img/logo.svg" alt="LUVIT logo">
        <span class="brand__name" data-i18n="brand.name">LUVIT</span>
      </a>

      <nav class="site-nav" aria-label="Main">
        <a href="index.html#shop" data-i18n="nav.shop"></a>
        <a href="index.html#about" data-i18n="nav.about"></a>
        <a href="index.html#contact" data-i18n="nav.contact"></a>
      </nav>

      <div class="header-actions">
        <button class="lang-toggle" type="button">عربي</button>
        <a class="cart-btn" href="cart.html" data-i18n-aria="nav.cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count is-empty">0</span>
        </a>
        <button class="nav-burger" type="button" aria-expanded="false" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="container hero-inner">
        <div class="reveal">
          <span class="hero__kicker" data-i18n="hero.kicker"></span>
          <h1 data-i18n="hero.title"></h1>
          <p class="hero__sub" data-i18n="hero.sub"></p>
          <div class="hero__ctas">
            <a class="btn btn--big" href="#shop" data-i18n="hero.cta"></a>
            <a class="btn btn--ghost btn--big" href="#about" data-i18n="hero.cta2"></a>
          </div>
        </div>
        <div class="hero__art reveal" id="heroArt" aria-hidden="true" style="--reveal-delay:0.15s"></div>
      </div>
    </section>

    <!-- USP strip -->
    <section class="usps">
      <div class="container usps-inner">
        <div class="usp reveal">
          <span class="usp__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg></span>
          <div><h3 data-i18n="usp.natural.t"></h3><p data-i18n="usp.natural.d"></p></div>
        </div>
        <div class="usp reveal" style="--reveal-delay:0.08s">
          <span class="usp__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg></span>
          <div><h3 data-i18n="usp.hand.t"></h3><p data-i18n="usp.hand.d"></p></div>
        </div>
        <div class="usp reveal" style="--reveal-delay:0.16s">
          <span class="usp__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></span>
          <div><h3 data-i18n="usp.lasting.t"></h3><p data-i18n="usp.lasting.d"></p></div>
        </div>
        <div class="usp reveal" style="--reveal-delay:0.24s">
          <span class="usp__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg></span>
          <div><h3 data-i18n="usp.delivery.t"></h3><p data-i18n="usp.delivery.d"></p></div>
        </div>
      </div>
    </section>

    <!-- Bestsellers -->
    <section class="section">
      <div class="container">
        <div class="section-head reveal">
          <h2 data-i18n="featured.title"></h2>
          <p data-i18n="featured.sub"></p>
        </div>
        <div class="grid" id="featuredGrid"></div>
      </div>
    </section>

    <!-- Full catalogue -->
    <section class="section section--tight" id="shop">
      <div class="container">
        <div class="section-head reveal">
          <h2 data-i18n="shop.title"></h2>
          <p data-i18n="shop.sub"></p>
        </div>

        <div class="shop-controls">
          <div class="chips" id="catChips" role="group" aria-label="Categories"></div>
          <div class="shop-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="searchInput" data-i18n-placeholder="shop.search" data-i18n-aria="shop.search">
          </div>
        </div>

        <div class="grid" id="shopGrid"></div>
        <p class="shop-empty" id="shopEmpty" data-i18n="shop.empty" hidden></p>
      </div>
    </section>

    <!-- About -->
    <section class="section about" id="about">
      <div class="container about-inner">
        <div class="about__art reveal" id="aboutArt" aria-hidden="true"></div>
        <div class="reveal" style="--reveal-delay:0.12s">
          <h2 data-i18n="about.title"></h2>
          <p data-i18n="about.p1"></p>
          <p data-i18n="about.p2"></p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer" id="contact">
    <div class="container footer-inner">
      <div>
        <a class="brand" href="index.html">
          <img src="assets/img/logo.svg" alt="LUVIT logo">
          <span class="brand__name" data-i18n="brand.name">LUVIT</span>
        </a>
        <p data-i18n="brand.tagline"></p>
      </div>
      <div>
        <h4 data-i18n="footer.shop"></h4>
        <a href="index.html#shop" data-i18n="nav.shop"></a>
        <a href="cart.html" data-i18n="nav.cart"></a>
        <a href="admin/index.html">Admin</a>
      </div>
      <div>
        <h4 data-i18n="footer.help"></h4>
        <a href="index.html#contact" data-i18n="footer.faq"></a>
        <a href="index.html#contact" data-i18n="footer.shipping"></a>
        <a href="index.html#contact" data-i18n="footer.privacy"></a>
      </div>
      <div>
        <h4 data-i18n="footer.contact"></h4>
        <a href="mailto:hello@luvit.om">hello@luvit.om</a>
        <a href="tel:+96891234567">+968 9123 4567</a>
        <a href="index.html#contact">@luvit_om</a>
      </div>
    </div>
    <div class="container footer-bottom">
      <span data-i18n="footer.rights"></span>
      <span data-i18n="footer.demo"></span>
    </div>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/art.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/store.js"></script>
</body>
</html>
